<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>I Love You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: sans-serif;
  background: radial-gradient(circle at top, #2a0015, #050508);
}

/* romantic glow */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,0,100,0.25), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(255,100,200,0.18), transparent 45%);
  animation: bgMove 6s infinite alternate;
}

@keyframes bgMove {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

.stage {
  height: 100vh;
  display: grid;
  place-items: center;
  position: relative;
}

.intro {
  text-align: center;
  color: white;
  transition: 0.5s;
  z-index: 2;
}

.intro.hide {
  opacity: 0;
  transform: scale(0.9);
  pointer-events: none;
}

button {
  margin-top: 20px;
  padding: 12px 22px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(135deg,#ff2d75,#ff5ea0);
  color: white;
  box-shadow: 0 0 25px rgba(255,0,120,0.4);
}

/* heart */
.heart-wrap {
  position: absolute;
  width: min(700px,90vw);
  opacity: 0;
  transition: 1s;
}

.heart-wrap.show {
  opacity: 1;
}

.heart-word {
  position: absolute;
  left: calc(var(--x) * 1%);
  top: calc(var(--y) * 1%);
  color: hsl(var(--hue),100%,70%);
  font-size: 12px;
  opacity: 0;
  animation: pop 1s ease forwards;
  animation-delay: calc(var(--delay) * 1ms);
}

@keyframes pop {
  to {
    opacity: 1;
    transform: translate(-50%,-50%) scale(1);
  }
}

.center-text {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 52px;
  font-weight: 900;
  color: white;
  text-shadow: 0 0 25px #ff2d75;
  opacity: 0;
  animation: fadeIn 1.2s ease forwards 1.2s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* sprinkles */
.sprinkle {
  position: fixed;
  font-size: 18px;
  animation: fall 2.5s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* floating particles */
.particle {
  position: absolute;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}
</style>
</head>

<body>

<div class="stage">

  <div class="intro" id="intro">
    <h1>💖 Love You 💖</h1>
    <button onclick="openHeart()">ACCEPT MESSAGE</button>
  </div>

  <div class="heart-wrap" id="heart"></div>

</div>
  <!-- BACKGROUND MUSIC -->
  <audio id="bgMusic" autoplay loop>
    <source src="../music/romantic-song.mp3" type="audio/mp3">
  </audio>
<script>

const heart = document.getElementById("heart");
const intro = document.getElementById("intro");

const words = ["I LOVE YOU","FOREVER","<3","MY HEART","LOVE"];

const points = [];
const step = 0.12;

/* heart shape */
for (let y = 1.3; y >= -1.3; y -= step) {
  for (let x = -1.3; x <= 1.3; x += step) {
    const v = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;
    if (v <= 0) {
      points.push({
        x: 50 + x * 35,
        y: 50 - y * 35
      });
    }
  }
}

/* INNER HTML HEART */
function createHeart() {
  let html = "";

  points.forEach((p, i) => {
    html += `
      <span class="heart-word"
        style="
          --x:${p.x};
          --y:${p.y};
          --delay:${Math.random()*800};
          --hue:${330 + Math.random()*20};
        ">
        ${words[i % words.length]}
      </span>
    `;
  });

  html += `<div class="center-text">I LOVE YOU ❤️</div>`;

  heart.innerHTML = html;
}

/* sprinkles */
function sprinkle() {
  const emojis = ["✨","💖","❤️","🌸","💫"];

  for (let i = 0; i < 25; i++) {
    const s = document.createElement("div");
    s.className = "sprinkle";
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];

    s.style.left = Math.random()*100 + "vw";
    s.style.top = "-10vh";
    s.style.fontSize = (12 + Math.random()*20) + "px";
    s.style.animationDuration = (1.5 + Math.random()*2) + "s";

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 3000);
  }
}

/* floating particles */
function particles() {
  const emojis = ["💖","✨","🌸","💫"];

  for (let i = 0; i < 15; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];

    p.style.left = Math.random()*100 + "vw";
    p.style.fontSize = (12 + Math.random()*18) + "px";
    p.style.animationDuration = (5 + Math.random()*5) + "s";

    document.body.appendChild(p);
  }
}
particles();

/* open */
function openHeart() {
  intro.classList.add("hide");
  heart.classList.add("show");

  createHeart();
  sprinkle();
}
   // auto play music on page load
   window.addEventListener("load", () => {
      const music = document.getElementById("bgMusic");

      if (music) {
        music.play().catch((err) => {
          console.log("Music blocked:", err);
        });
      }
    });

    // stop music function
    function stopMusic() {
      const music = document.getElementById("bgMusic");

      if (music) {
        music.pause();
        music.currentTime = 0; // restart next time
      }
    }

</script>


</body>
</html>
