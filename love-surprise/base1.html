<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You</title>

  <style>
    :root {
      --bg: #050508;
      --white: #fff7fb;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      color: var(--white);
      background: radial-gradient(circle, #1a0010, #050508);
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      perspective: 900px;
    }

    .intro {
      text-align: center;
      transition: 0.4s ease;
    }

    .intro.hide {
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      pointer-events: none;
    }

    .button {
      margin-top: 20px;
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff2d75, #b8003d);
    }

    .heart-wrap {
      position: absolute;
      width: min(700px, 92vw);
      aspect-ratio: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .heart-wrap.show {
      opacity: 1;
    }

    .heart-word {
      position: absolute;
      left: calc(var(--x) * 1%);
      top: calc(var(--y) * 1%);
      font-size: 12px;
      color: hsl(var(--hue), 100%, 65%);
      transform: translate(-50%, -50%);
      opacity: 0;
      animation: pop 0.8s ease forwards;
      animation-delay: calc(var(--delay) * 1ms);
    }

    @keyframes pop {
      to {
        opacity: var(--opacity);
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .center-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 48px;
      font-weight: 900;
      text-shadow: 0 0 20px #ff2d75;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.2s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

<body>
<main class="stage">

  <section class="intro" id="intro">
    <h1>Love You ❤️</h1>
    <button class="button" id="startBtn" aria-label="Open message">
      ACCEPT MESSAGE
    </button>
  </section>

  <section class="heart-wrap" id="heart"></section>

</main>

  <!-- BACKGROUND MUSIC -->
  <audio id="bgMusic" autoplay loop>
    <source src="../music/romantic-song.mp3" type="audio/mp3">
  </audio>
<script>
     // auto play music on page load
    window.addEventListener("load", () => {
      const music = document.getElementById("bgMusic");

      if (music) {
        music.play().catch((err) => {
          console.log("Music blocked:", err);
        });
      }
    });

    // stop music function
    function stopMusic() {
      const music = document.getElementById("bgMusic");

      if (music) {
        music.pause();
        music.currentTime = 0; // restart next time
      }
    }
  const heart = document.getElementById("heart");
  const intro = document.getElementById("intro");
  const startBtn = document.getElementById("startBtn");

  let opened = false;

  const words = ["I love you", "forever", "<3", "my heart", "love"];

  const points = [];
  const step = 0.12;

  // heart shape generator
  for (let y = 1.3; y >= -1.3; y -= step) {
    for (let x = -1.3; x <= 1.3; x += step) {
      const v = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;
      if (v <= 0) {
        points.push({
          x: 50 + x * 35,
          y: 50 - y * 35
        });
      }
    }
  }

  function createHeart() {
    const frag = document.createDocumentFragment();

    points.forEach((p, i) => {
      const span = document.createElement("span");
      span.className = "heart-word";
      span.textContent = words[i % words.length];

      span.style.setProperty("--x", p.x);
      span.style.setProperty("--y", p.y);
      span.style.setProperty("--delay", Math.random() * 800);
      span.style.setProperty("--hue", 340 + Math.random() * 10);
      span.style.setProperty("--opacity", 0.6 + Math.random() * 0.4);

      frag.appendChild(span);
    });

    const center = document.createElement("div");
    center.className = "center-text";
    center.textContent = "I LOVE YOU ❤️";

    frag.appendChild(center);

    heart.innerHTML = "";
    heart.appendChild(frag);
  }

  function openHeart() {
    if (opened) return;
    opened = true;

    createHeart();
    intro.classList.add("hide");
    heart.classList.add("show");
  }

  startBtn.addEventListener("click", openHeart);

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") openHeart();
  });

  // smoother mouse effect (throttled)
  let last = 0;
  window.addEventListener("mousemove", (e) => {
    if (!heart.classList.contains("show")) return;

    const now = Date.now();
    if (now - last < 16) return; // ~60fps
    last = now;

    const x = (e.clientX / window.innerWidth - 0.5) * 6;
    const y = (e.clientY / window.innerHeight - 0.5) * -6;

    heart.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  });

</script>
</body>
</html>
