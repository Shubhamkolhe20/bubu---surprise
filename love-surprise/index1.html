<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💖 Proposal Page</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <div class="tenor-gif-embed"
      data-postid="22885016"
      data-share-method="host"
      data-aspect-ratio="1.04918"
      data-width="100%">

      <a href="https://tenor.com/view/manja-gif-22885016">
        Manja Sticker
      </a>

    </div>

    <script async src="https://tenor.com/embed.js"></script>

    <h1 style="color: black;">Do you love me? 🤗</h1>
    <p style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; color: darkmagenta;">  ❤️ I Am Waiting For Your Reply</p>

    <div class="btn">
      <a href="base.html">Yes ❤️</a>
      <a href="no1.html">No 💔</a>
    </div>

    <!-- MUSIC CONTROL BUTTON -->
    <button onclick="stopMusic()">⏹ Stop Music</button>

  </div>

  <!-- BACKGROUND MUSIC -->
  <audio id="bgMusic" autoplay loop>
    <source src="../music/romantic-song.mp3" type="audio/mp3">
  </audio>

  <!-- SCRIPT -->
  <script>
    // auto play music on page load
    window.addEventListener("load", () => {
      const music = document.getElementById("bgMusic");

      if (music) {
        music.play().catch((err) => {
          console.log("Music blocked:", err);
        });
      }
    });

    // stop music function
    function stopMusic() {
      const music = document.getElementById("bgMusic");

      if (music) {
        music.pause();
        music.currentTime = 0; // restart next time
      }
    }
  </script>

</body>

</html>
